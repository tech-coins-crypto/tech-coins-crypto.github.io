<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>American Innovation $1 | Tech Coins Crypto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }
    </style>
</head>
<body class="bg-black text-white antialiased font-sans">

    <nav class="border-b border-zinc-900 bg-black/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="font-black text-lg tracking-[0.25em] text-white">
                TECH COINS CRYPTO
            </div>
            <div class="hidden md:flex space-x-8 text-xs font-bold tracking-widest text-white">
                <a href="#" class="hover:underline transition py-1">VEHICLES</a>
                <a href="#" class="hover:underline transition py-1">COINS TICKER</a>
                <a href="#" class="hover:underline transition py-1">SHOP</a>
            </div>
        </div>
    </nav>

    <header class="relative min-h-[80vh] flex items-center overflow-hidden border-b border-zinc-900 bg-black px-6 md:px-12">
        
        <div class="relative z-10 max-w-2xl lg:pl-12 my-auto">
            <h1 class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-black tracking-tight leading-none text-white uppercase mb-6">
                American Innovation $1
            </h1>
            <p class="text-white text-sm md:text-base font-medium leading-relaxed max-w-xl mb-3">
                2018美國創新1美元紀念幣。喬治·華盛頓簽署全美第一份專利證書。
            </p>
            <p class="text-white text-sm md:text-base font-medium leading-relaxed max-w-xl mb-8">
                這個網站所有圖片跟文字<br>
                就是要勸敗你買幣
            </p>
            <a href="#explore" class="inline-block border border-white text-white text-xs font-bold tracking-widest uppercase px-8 py-4 hover:bg-white hover:text-black transition-all duration-300">
                EXPLORE NOW →
            </a>
        </div>

        <div class="absolute -right-16 sm:-right-20 md:-right-28 top-1/2 -translate-y-1/2 w-[260px] h-[260px] sm:w-[380px] sm:h-[380px] md:w-[480px] md:h-[480px] lg:w-[560px] lg:h-[560px] rounded-full overflow-hidden select-none pointer-events-none">
            <div class="absolute inset-0 rounded-full shadow-[inset_-30px_0px_60px_rgba(0,0,0,1),inset_30px_0px_80px_rgba(255,255,255,0.05)] z-10"></div>
            <img src="/coin2018.png" alt="2018 Innovation Coin" 
                 class="w-full h-full object-cover rounded-full opacity-80 brightness-[0.85] contrast-[1.1]"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="hidden w-full h-full bg-gradient-to-r from-zinc-950 via-zinc-800 to-amber-950/40 items-center justify-center rounded-full"></div>
        </div>
    </header>

    <main id="explore" class="max-w-7xl mx-auto px-6 py-16">
        
        <section class="mb-20">
            <h2 class="text-xs font-bold tracking-[0.3em] text-white uppercase mb-8 flex items-center space-x-3">
                <span class="w-1 h-3 bg-white"></span>
                <span>ACTIVE MISSIONS / 已解密故事庫</span>
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                {{ range .Site.RegularPages }}
                <div class="bg-zinc-950 border border-zinc-900 rounded-none p-6 flex flex-col justify-between hover:border-zinc-500 transition-all duration-300 group">
                    <div>
                        <div class="flex justify-between items-center text-xs tracking-widest font-mono text-white">
                            <span>{{ .Params.coin_number }} // {{ .Params.state }}</span>
                            <span class="text-white font-bold border border-white/40 bg-white/5 px-2 py-0.5 rounded-none">{{ .Params.status }}</span>
                        </div>
                        <h4 class="font-bold text-white mt-4 text-xl tracking-wide">
                            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
                        </h4>
                        <p class="text-white text-xs mt-3 leading-relaxed font-light line-clamp-3">{{ .Summary }}</p>
                    </div>
                    <div class="mt-8 pt-4 border-t border-zinc-900 flex justify-between items-center">
                        <span class="text-[10px]
