<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control | Tech Coins Crypto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, h1, h2, h3, h4, p, span, a, div { color: #ffffff !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }
    </style>
</head>
<body class="bg-black text-white antialiased font-sans min-h-screen flex flex-col">
    <nav class="border-b border-zinc-900 bg-black/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="font-black text-lg tracking-[0.25em] text-white hover:opacity-80 transition">TECH COINS CRYPTO</a>
            <div class="hidden md:flex space-x-8 text-xs font-bold tracking-widest text-white">
                <a href="/" class="hover:underline transition py-1">美國創新</a>
                <a href="#" class="hover:underline transition py-1">美國鷹揚(建置中)</a>
                <a href="#" class="hover:underline transition py-1">買</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-4xl mx-auto px-6 py-12 w-full space-y-12">
        
        <div class="flex justify-between items-center border-b border-zinc-900 pb-4 font-mono text-xs tracking-widest uppercase">
            <div id="mission-crumbs" class="text-zinc-400">MISSION // COIN SIGNAL SCANNING</div>
            <div class="text-zinc-400 bg-zinc-950/40 border border-zinc-800 px-3 py-1 rounded">SPECIMEN PREVIEW</div>
        </div>

        <div class="space-y-2">
            <h1 id="mission-title" class="text-3xl md:text-4xl font-black tracking-tight text-white">任務解密中</h1>
        </div>

        <div class="flex justify-center py-6 select-none">
            <div class="relative w-64 h-64 md:w-80 md:h-80 rounded-full bg-zinc-950/40 border border-zinc-900/60 flex items-center justify-center overflow-hidden shadow-[inset_-30px_0px_60px_rgba(0,0,0,1),inset_30px_0px_80px_rgba(255,255,255,0.05)]">
                <img id="coin-target-img" src="/coins/coin-2018-Introductory.png" class="w-[85%] h-[85%] object-cover rounded-full brightness-[0.85] contrast-[1.1]" alt="Mission Coin">
            </div>
        </div>

        <div id="mission-status-box" class="text-center font-mono py-4 border-y border-zinc-900/60 select-none">
            <span class="text-sm md:text-base font-bold tracking-[0.2em] text-white">【 尋找專屬文獻 / SEARCHING TEXT DOSSIER 】</span>
        </div>

        <article id="article-payload" class="space-y-6 text-zinc-300 leading-relaxed tracking-wide text-base md:text-lg min-h-[150px] py-4">
            </article>

    </main>

    <footer class="border-t border-zinc-900 bg-black py-12 px-6 text-center font-mono mt-auto w-full">
        <div class="max-w-4xl mx-auto space-y-2">
            <p class="text-[10px] tracking-widest uppercase text-zinc-500">© 2026 Tech Coins Crypto. Hosted on Cloudflare planetary edge servers.</p>
        </div>
    </footer>

    <script>
        async function parseUrlSignals() {
            const urlParams = new URLSearchParams(window.location.search);
            const targetYear = urlParams.get('year') || '2018';
            const targetState = urlParams.get('state') || '美國';
            const targetImg = urlParams.get('img') || 'coin-2018-Introductory.png';

            // 1. 基礎外觀渲染
            document.getElementById('mission-crumbs').innerText = `MISSION // ${targetYear} // ${targetState}`;
            document.getElementById('coin-target-img').src = `/coins/${targetImg}`;
            document.getElementById('mission-title').innerText = `${targetYear} ${targetState} 1 美元紀念任務`;

            // 2. 終極安全路由：使用 .json 檔案格式，徹底杜絕雲端平台的網頁重定向干擾
            const baseFileName = targetImg.substring(0, targetImg.lastIndexOf('.')) || targetImg;
            const articleDataUrl = `/txts/txt-${baseFileName}.json`;

            const articlePayload = document.getElementById('article-payload');
            const statusBox = document.getElementById('mission-status-box');

            try {
                const response = await fetch(articleDataUrl);
                
                // 強大防線：如果不是合法的 JSON 回傳（包含撈到 404 網頁），立刻切入後備狀態
                const contentType = response.headers.get("content-type") || "";
                if (!response.ok || !contentType.includes("application/json")) {
                    throw new Error("Asset missing or invalid JSON content feed");
                }

                const data = await response.json();
                const lines = data.paragraphs || [];
                
                if (lines.length === 0) throw new Error("Empty paragraph datastream");

                // 清空原本的容器
                articlePayload.innerHTML = "";
                
                // 自動幫您的純文字包上科技感網頁標籤
                lines.forEach((lineText, index) => {
                    const pTag = document.createElement('p');
                    if (index === 0) {
                        pTag.className = "font-bold text-white text-xl border-l-2 border-white pl-3 font-sans mb-6";
                    } else {
                        pTag.className = "text-zinc-300 leading-relaxed tracking-wide text-base md:text-lg mb-4";
                    }
                    pTag.innerText = lineText; 
                    articlePayload.appendChild(pTag);
                });
                
                if (targetYear === "2018") {
                    document.getElementById('mission-title').innerText = "美國 1 美元紀念任務：第一號專利大序章";
                }
                statusBox.innerHTML = `<span class="text-sm md:text-base font-bold tracking-[0.2em] text-emerald-400">【 任務解密完畢 / DOSSIER DECRYPTED 】</span>`;
                
            } catch (err) {
                // 後備防崩塌機制
                document.getElementById('mission-title').innerText = `${targetYear} ${targetState} 1 美元紀念任務`;
                statusBox.innerHTML = `<span class="text-sm md:text-base font-bold tracking-[0.2em] text-zinc-500">【 文獻整備中 / DATA SUPPLY LOADING 】</span>`;
                articlePayload.innerHTML = `
                    <div class="space-y-4">
                        <p class="text-zinc-300">這是 ${targetYear} 年發行的 ${targetState} 紀念任務專屬解密艙。</p>
                        <p class="text-zinc-400 text-sm">目前主控台尚未在雲端成功同步配套的獨立文獻存檔（/txts/txt-${baseFileName}.json）。核心故事與勸敗密鑰正在整備編譯中，詳細數據將在檔案同步後自動解鎖部署。</p>
                    </div>`;
            }
        }
        document.addEventListener('DOMContentLoaded', parseUrlSignals);
    </script>
</body>
</html>
