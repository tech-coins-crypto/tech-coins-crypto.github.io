<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | Tech Coins Crypto</title>
    <!-- 引入美化視覺引擎 -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans">

    <!-- 內頁導覽列 -->
    <nav class="bg-slate-900 text-white shadow-md">
        <div class="max-w-3xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="/" class="font-bold text-xl tracking-wider text-indigo-400">🪙 Tech Coins Crypto</a>
            <a href="/" class="text-sm text-slate-300 hover:text-white">← 返回首頁</a>
        </div>
    </nav>

    <!-- 故事內文區塊 -->
    <main class="max-w-3xl mx-auto px-4 py-12">
        <article class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
            <div class="flex justify-between items-center">
                <span class="text-xs font-mono text-indigo-600 font-bold uppercase tracking-wider">{{ .Params.coin_number }} · {{ .Params.state }}</span>
                <span class="text-xs text-amber-600 font-bold bg-amber-50 px-2.5 py-1 rounded-md">{{ .Params.grade_suggest }}</span>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 mt-3 mb-6 pb-4 border-b border-slate-100">{{ .Title }}</h1>
            
            <!-- 魔法核心：這裡會自動倒入你寫的純文字故事 -->
            <div class="text-slate-700 leading-relaxed space-y-6 text-base prose">
                {{ .Content }}
            </div>
        </article>
    </main>

</body>
</html>
