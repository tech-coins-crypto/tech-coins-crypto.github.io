<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幣圈宅 TECH COINS CRYPTO | Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, h1, h2, h3, h4, p, span, a, div { color: #ffffff !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }
    </style>
</head>
<body class="bg-black text-white antialiased font-sans flex flex-col min-h-screen">
    <nav class="border-b border-zinc-900 bg-black/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="font-black text-xl tracking-wide text-white hover:opacity-80 transition flex items-center space-x-2">
                <span class="text-white">幣圈宅</span>
                <span class="text-zinc-500 font-medium text-sm border-l border-zinc-800 pl-2">找到屬於自己的精緻幣</span>
            </a>
            <div class="hidden md:flex space-x-8 text-xs font-bold tracking-widest text-white">
                <a href="#" class="hover:underline transition py-1">美國創新</a>
                <a href="#" class="hover:underline transition py-1">美國鷹揚(建置中)</a>
                <a href="#" class="hover:underline transition py-1">買</a>
            </div>
        </div>
    </nav>
    <main class="flex-grow max-w-6xl mx-auto px-6 py-12 w-full space-y-8">
        <div class="border-b border-zinc-900 pb-6">
            <h1 id="mission-title" class="text-3xl md:text-4xl font-black tracking-tight text-white">載入中...</h1>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-12 gap-12 items-start">
            <div class="md:col-span-7 flex flex-col justify-between min-h-full">
                <article id="article-payload" class="space-y-6 text-zinc-300 leading-relaxed tracking-wide text-base md:text-lg py-2"></article>
                <div id="coin-keywords" class="flex flex-wrap justify-start gap-2 pt-6 mt-8 border-t border-zinc-900/40 w-full"></div>
            </div>
            
            <div id="right-visual-deck" class="md:col-span-5 flex flex-col space-y-6 items-center select-none sticky md:top-24 py-2">
                <div id="main-coin-frame" class="relative w-64 h-64 md:w-80 md:h-80 rounded-full bg-zinc-950/40 border border-zinc-900/60 flex items-center justify-center overflow-hidden shadow-[inset_-30px_0px_60px_rgba(0,0,0,1),inset_30px_0px_80px_rgba(255,255,255,0.05)]">
                    <img id="coin-target-img" src="" class="w-[85%] h-[85%] object-cover rounded-full brightness-[0.85] contrast-[1.1]" alt="">
                </div>
                <div id="gallery-append-deck" class="w-full flex flex-col space-y-4 pt-4"></div>
            </div>
        </div>
    </main>
    
    <footer class="border-t border-zinc-900 bg-black py-10 px-6 font-mono mt-auto w-full">
        <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 items-center text-left">
            <div class="space-y-0.5">
                <a href="#" onclick="history.back(); return false;" class="block font-black text-lg text-white tracking-wider hover:opacity-80 transition cursor-pointer">幣圈宅</a>
                <p class="text-[10px] text-zinc-500 tracking-widest font-bold">TECH COINS CRYPTO</p>
            </div>
            <div class="md:col-span-2 text-[11px] text-zinc-500 font-sans leading-tight space-y-2">
                <p class="text-zinc-400 font-medium">硬幣設計與圖片來源：美國鑄幣局。</p>
                <p class="pt-1 text-[10px] font-mono uppercase tracking-widest text-zinc-600 leading-none">© 2026 Tech Coins Crypto.</p>
            </div>
        </div>
    </footer>

    <script>
        async function parseUrlSignals() {
            const urlParams = new URLSearchParams(window.location.search);
            const targetYear = urlParams.get('year') || '2018';
            const targetState = urlParams.get('state') || '美國';
            const targetImg = urlParams.get('img') || 'coin-2018-introductory.webp';
            
            const mainCoinFrame = document.getElementById('main-coin-frame');
            const galleryAppendDeck = document.getElementById('gallery-append-deck');
            
            let fallbackTitle = `${targetYear} ${targetState}`;
            let currentCoinNickname = ""; let matchedKeywords = "";
            
            try {
                const csvResponse = await fetch('/data/subjects.csv');
                const csvText = await csvResponse.text();
                const csvLines = csvResponse.ok ? csvText.replace(/\r/g, '').split('\n').filter(l => l.trim() !== '') : [];
                if (csvLines.length > 0) {
                    const headers = csvLines.shift().split(',').map(h => h.trim());
                    const nicknameIdx = headers.indexOf('nickname'); const yearIdx = headers.indexOf('year'); 
                    const stateIdx = headers.indexOf('state'); const keywordsIdx = headers.indexOf('keywords');
                    for (let i = 0; i < csvLines.length; i++) {
                        const parts = csvLines[i].split(',');
                        const cYear = parts[yearIdx]?.trim(); const cState = parts[stateIdx]?.trim();
                        if ((cYear === targetYear && cState === targetState) || (targetYear === '2018' && cYear === '2018')) {
                            if (targetYear === '2018') { currentCoinNickname = "專利幣"; } 
                            else { currentCoinNickname = parts[nicknameIdx]?.trim() || ""; }
                            matchedKeywords = parts[keywordsIdx]?.trim() || ""; break;
                        }
                    }
                }
                if (!currentCoinNickname && targetYear === '2018') currentCoinNickname = "專利幣";
                fallbackTitle = `${targetYear} ${targetState} ${currentCoinNickname}`;
                
                const keywordsContainer = document.getElementById('coin-keywords'); keywordsContainer.innerHTML = '';
                if (matchedKeywords) {
                    const tags = matchedKeywords.split(' ').filter(t => t.trim() !== '');
                    tags.forEach(tag => {
                        const span = document.createElement('span');
                        span.className = "px-2.5 py-0.5 text-xs font-medium tracking-wide rounded border border-emerald-500/40 !text-emerald-400 bg-emerald-950/20 select-none";
                        span.innerText = tag; span.style.setProperty('color', '#34d399', 'important'); keywordsContainer.appendChild(span);
                    });
                }
            } catch (csvErr) { console.error(csvErr); }

            const lowerImgCheck = targetImg.toLowerCase();
            
            // 雙幣硬幣框渲染邏輯
            if (targetYear === '2018') {
                mainCoinFrame.className = "flex flex-row justify-center items-center -space-x-8 md:-space-x-14 w-full px-2";
                mainCoinFrame.innerHTML = `
                    <div class="relative w-40 h-40 sm:w-48 sm:h-48 md:w-60 md:h-60 rounded-full bg-zinc-950/40 border border-zinc-900/60 flex items-center justify-center overflow-hidden shadow-[inset_-25px_0px_50px_rgba(0,0,0,1),0_15px_40px_rgba(0,0,0,0.85)] z-20 transition-all duration-300 hover:scale-105 hover:z-30 hover:border-zinc-600">
                        <img src="/coins/coin-2018-introductory.webp" class="w-[85%] h-[85%] object-cover rounded-full" alt="">
                    </div>
                    <div class="relative w-40 h-40 sm:w-48 sm:h-48 md:w-60 md:h-60 rounded-full bg-zinc-950/40 border border-zinc-900/60 flex items-center justify-center overflow-hidden shadow-[inset_-25px_0px_50px_rgba(0,0,0,1),0_15px_40px_rgba(0,0,0,0.85)] z-10 transition-all duration-300 hover:scale-105 hover:z-30 hover:border-zinc-600">
                        <img src="/coins/coin-2018-l.webp" class="w-[85%] h-[85%] object-cover rounded-full" alt="">
                    </div>
                `;
            } else if (currentCoinNickname === "賈伯斯幣" || lowerImgCheck.includes("jobs") || lowerImgCheck.includes("california")) {
                mainCoinFrame.className = "flex flex-row justify-center items-center -space-x-8 md:-space-x-14 w-full px-2";
                mainCoinFrame.innerHTML = `
                    <div class="relative w-40 h-40 sm:w-48 sm:h-48 md:w-60 md:h-60 rounded-full bg-zinc-950/40 border border-zinc-900/60 flex items-center justify-center overflow-hidden shadow-[inset_-25px_0px_50px_rgba(0,0,0,1),0_15px_40px_rgba(0,0,0,0.85)] z-20 transition-all duration-300 hover:scale-105 hover:z-30 hover:border-zinc-600">
                        <img src="/coins/${lowerImgCheck}" class="w-[85%] h-[85%] object-cover rounded-full" alt="">
                    </div>
                    <div class="relative w-40 h-40 sm:w-48 sm:h-48 md:w-60 md:h-60 rounded-full bg-zinc-950/40 border border-zinc-900/60 flex items-center justify-center overflow-hidden shadow-[inset_-25px_0px_50px_rgba(0,0,0,1),0_15px_40px_rgba(0,0,0,0.85)] z-10 transition-all duration-300 hover:scale-105 hover:z-30 hover:border-zinc-600">
                        <img src="/coins/coin-250y.webp" class="w-[85%] h-[85%] object-cover rounded-full" alt="">
                    </div>
                `;
            } else {
                mainCoinFrame.className = "relative w-64 h-64 md:w-80 md:h-80 rounded-full bg-zinc-950/40 border border-zinc-900/60 flex items-center justify-center overflow-hidden shadow-[inset_-30px_0px_60px_rgba(0,0,0,1),inset_30px_0px_80px_rgba(255,255,255,0.05)]";
                mainCoinFrame.innerHTML = `<img id="coin-target-img" src="" class="w-[85%] h-[85%] object-cover rounded-full brightness-[0.85] contrast-[1.1]" alt="">`;
                document.getElementById('coin-target-img').src = `/coins/${lowerImgCheck}`;
            }

            // 底部附圖渲染邏輯
            galleryAppendDeck.innerHTML = '';
            const cleanFileBlueprint = lowerImgCheck.replace(/^coin-/, '').replace(/\.[^/.]+$/, "").trim();
            for (let i = 1; i <= 4; i++) {
                const fallbackSmallImgUrl = `/images/image${i}-${cleanFileBlueprint}.webp`;
                const imgContainer = document.createElement('div');
                imgContainer.id = `append-img-box-${i}`;
                imgContainer.innerHTML = `
                    <img src="${fallbackSmallImgUrl}" 
                         class="w-full h-auto object-cover rounded border border-zinc-900/60 bg-zinc-950/20 p-2 rounded-lg transition-all duration-300 hover:border-zinc-800" 
                         loading="lazy"
                         onerror="document.getElementById('append-img-box-${i}').remove();">
                `;
                galleryAppendDeck.appendChild(imgContainer);
            }

            // 🎯 核心回歸邏輯：讀取文章內容並正確設定標題
            const baseFileName = targetImg.substring(0, targetImg.lastIndexOf('.')) || targetImg;
            const articleTextUrl = `/txts/txt-${baseFileName}.txt`; 
            const articlePayload = document.getElementById('article-payload');
            
            try {
                const response = await fetch(articleTextUrl); 
                const contentType = response.headers.get("content-type") || "";
                if (!response.ok || contentType.includes("text/html")) throw new Error("Offline");
                
                const rawText = await response.text();
                const lines = rawText.split('\n').map(line => line.trim()).filter(line => line !== "");
                articlePayload.innerHTML = "";
                
                if (lines.length > 0) {
                    // 🎯 1. 既然有文章，大標題直接採用 .txt 檔的第一行文字
                    document.getElementById('mission-title').innerText = lines[0];
                    
                    lines.forEach((lineText, index) => {
                        if (index === 0) { 
                            // 第一行已當作大標題，這裡不重複渲染在文章區
                        } else {
                            const pTag = document.createElement('p');
                            // 第二行作為粗體前導言
                            if (index === 1) pTag.className = "font-bold text-white text-xl border-l-2 border-white pl-3 font-sans mb-6 mt-0";
                            else pTag.className = "text-zinc-300 leading-relaxed tracking-wide text-base md:text-lg mb-4";
                            pTag.innerText = lineText; 
                            articlePayload.appendChild(pTag);
                        }
                    });
                } else {
                    throw new Error("EmptyFile");
                }
            } catch (err) {
                // 🎯 2. 備援機制：如果抓不到 .txt 或檔案空空如也，大標題才採用 CSV 撈出來的 [年][州別][綽號]
                document.getElementById('mission-title').innerText = fallbackTitle;
                articlePayload.innerHTML = `<p class="font-bold text-white text-xl border-l-2 border-white pl-3 font-sans mb-6 mt-0">目前沒空寫這枚介紹。有靈感或是入手此幣，就會開始寫啦！</p>`;
            }
        }
        document.addEventListener('DOMContentLoaded', parseUrlSignals);
    </script>
</body>
</html>
