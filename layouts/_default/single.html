<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>硬幣詳情 | 幣圈宅 TECH COINS CRYPTO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, h1, h2, h3, h4, h5, p, a, span, div { color: #ffffff !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }
    </style>
</head>
<body class="bg-black text-white antialiased font-sans flex flex-col min-h-screen">
    <nav class="border-b border-zinc-900 bg-black/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="font-black text-xl tracking-wide text-white hover:opacity-80 transition flex items-center space-x-2">
                <span class="text-white">幣圈宅</span>
                <span class="text-zinc-500 font-medium text-sm border-l border-zinc-800 pl-2">錢幣勸敗網</span>
            </a>
            <div class="hidden md:flex space-x-8 text-xs font-bold tracking-widest text-white">
                <a href="/" class="hover:underline transition py-1">美國創新</a>
                <a href="#" class="hover:underline transition py-1">美國鷹揚(建置中)</a>
                <a href="#" class="hover:underline transition py-1">買</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12 md:py-20 w-full flex-grow grid grid-cols-1 md:grid-cols-12 gap-12 md:gap-16 items-start">
        
        <div class="md:col-span-5 flex flex-col items-center space-y-6 sticky top-28">
            <div class="w-64 h-64 sm:w-80 sm:h-80 md:w-full md:max-w-[360px] aspect-square rounded-full border border-zinc-900 bg-zinc-950 flex items-center justify-center overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.8)]">
                <img id="detail-coin-img" src="/coins/coin-2018-Introductory.png" class="w-[90%] h-[90%] object-cover rounded-full brightness-[0.88] contrast-[1.05]" alt="Coin Visual">
            </div>
            
            <div id="coin-keywords" class="w-full max-w-[360px] flex flex-wrap justify-center gap-2 pt-2">
                </div>
        </div>

        <div class="md:col-span-7 space-y-8">
            <div class="space-y-2 border-b border-zinc-900 pb-6">
                <div class="flex items-center space-x-3 font-mono text-xs tracking-widest text-zinc-500 uppercase">
                    <span id="detail-coin-year">----</span>
                    <span>//</span>
                    <span id="detail-coin-state">------</span>
                </div>
                <h2 id="detail-coin-title" class="text-3xl md:text-4xl font-black tracking-tight text-white">加載中...</h2>
            </div>

            <div class="prose prose-invert max-w-none text-zinc-300 text-base leading-relaxed space-y-6 font-sans">
                {{ .Content }}
            </div>

            <div class="pt-6 border-t border-zinc-900">
                <a href="/" class="inline-block border border-zinc-800 text-zinc-400 text-xs font-bold tracking-widest uppercase px-6 py-3 rounded hover:border-zinc-500 hover:text-white transition-all duration-300">← 返回主矩陣</a>
            </div>
        </div>
    </main>

    <footer class="border-t border-zinc-900 bg-black py-10 px-6 font-mono mt-auto w-full">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 items-center text-left">
            <div class="space-y-0.5">
                <p class="font-black text-lg text-white tracking-wider">幣圈宅</p>
                <p class="text-[10px] text-zinc-500 tracking-widest font-bold">TECH COINS CRYPTO</p>
            </div>
            <div class="md:col-span-2 text-[11px] text-zinc-500 font-sans leading-tight space-y-2">
                <div>
                    <p class="text-zinc-400 font-medium">硬幣設計與圖片來源：美國鑄幣局。</p>
                    <p class="text-zinc-500">本網站為錢幣愛好者製作，與美國鑄幣局及美國政府無關聯、背書或授權。</p>
                </div>
                <div class="pt-1 text-[10px] font-mono uppercase tracking-widest text-zinc-600 leading-none">
                    © 2026 Tech Coins Crypto. Hosted on Cloudflare planetary edge servers.
                </div>
            </div>
        </div>
    </footer>

    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        async function initDetailPage() {
            const paramYear = getQueryParam('year');
            const paramState = getQueryParam('state');
            const paramImg = getQueryParam('img');

            // 預先抓取 URL 安全快照渲染，防止畫面死白
            if (paramYear) document.getElementById('detail-coin-year').innerText = paramYear;
            if (paramState) document.getElementById('detail-coin-state').innerText = paramState;
            if (paramImg) document.getElementById('detail-coin-img').src = '/coins/' + paramImg;

            try {
                const response = await fetch('/data/subjects.csv');
                const csvText = await response.text();
                const lines = csvText.replace(/\r/g, '').split('\n').filter(line => line.trim() !== '');
                
                // 解析 CSV 欄位標頭
                const headers = lines.shift().split(',').map(h => h.trim());
                const nicknameIdx = headers.indexOf('nickname');
                const subjectIdx = headers.indexOf('subject');
                const yearIdx = headers.indexOf('year');
                const stateIdx = headers.indexOf('state');
                const imgIdx = headers.indexOf('img');
                const keywordsIdx = headers.indexOf('keywords'); // 🚀 鎖定新加入的關鍵字欄位

                const csvCoins = lines.map(line => {
                    const parts = line.split(',');
                    return {
                        nickname: parts[nicknameIdx]?.trim(),
                        subject: parts[subjectIdx]?.trim(),
                        year: parts[yearIdx]?.trim(),
                        state: parts[stateIdx]?.trim(),
                        img: parts[imgIdx]?.trim(),
                        keywords: parts[keywordsIdx]?.trim() || "" // 🚀 讀取關鍵字
                    };
                });

                // 進行智慧比對鎖定當前錢幣
                let matchedCoin = csvCoins.find(c => c.year === paramYear && c.state === paramState);
                
                // 針對 2018 首發幣的極端邊界安全相容
                if (!matchedCoin && paramYear === '2018') {
                    matchedCoin = csvCoins.find(c => c.year === '2018');
                }

                if (matchedCoin) {
                    document.getElementById('detail-coin-title').innerText = matchedCoin.nickname + ' - ' + matchedCoin.subject;
                    
                    // 🚀 關鍵字標籤渲染邏輯 (對齊截圖 2 的綠字綠框，並設定樣式不覆蓋白字)
                    const keywordsContainer = document.getElementById('coin-keywords');
                    keywordsContainer.innerHTML = ''; // 清空加載預設

                    if (matchedCoin.keywords) {
                        // 使用空格把關鍵字切開成陣列
                        const tagsArray = matchedCoin.keywords.split(' ').filter(t => t.trim() !== '');
                        
                        tagsArray.forEach(tag => {
                            const tagElement = document.createElement('span');
                            // Tailwind 樣式：綠字(text-emerald-400)、綠框(border-emerald-500/50)、緊湊內襯
                            tagElement.className = "px-2.5 py-0.5 text-xs font-medium tracking-wide rounded border border-emerald-500/40 !text-emerald-400 bg-emerald-950/20 select-none";
                            tagElement.innerText = tag;
                            // 強制保護字體色彩為綠色，不被全域白字覆蓋
                            tagElement.style.setProperty('color', '#34d399', 'important');
                            keywordsContainer.appendChild(tagElement);
                        });
                    }
                } else {
                    document.getElementById('detail-coin-title').innerText = paramState ? paramState + "特製幣" : "未定義錢幣";
                }

            } catch (err) {
                console.error("Detail Page Sync Error:", err);
                document.getElementById('detail-coin-title').innerText = "資料庫聯動中斷";
            }
        }

        document.addEventListener('DOMContentLoaded', initDetailPage);
    </script>
</body>
</html>
